<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#16a34a"/>
  <!-- Calendar icon simplified -->
  <rect x="6" y="9" width="20" height="16" rx="2.5" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5"/>
  <!-- Calendar top bar -->
  <rect x="6" y="9" width="20" height="5" rx="2" fill="white" fill-opacity="0.3"/>
  <!-- Calendar pins -->
  <rect x="11" y="7" width="2" height="4" rx="1" fill="white"/>
  <rect x="19" y="7" width="2" height="4" rx="1" fill="white"/>
  <!-- Calendar grid dots -->
  <rect x="10" y="18" width="2.5" height="2.5" rx="0.5" fill="white"/>
  <rect x="14.75" y="18" width="2.5" height="2.5" rx="0.5" fill="white"/>
  <rect x="19.5" y="18" width="2.5" height="2.5" rx="0.5" fill="white"/>
  <rect x="10" y="21.5" width="2.5" height="2.5" rx="0.5" fill="white" fill-opacity="0.6"/>
  <rect x="14.75" y="21.5" width="2.5" height="2.5" rx="0.5" fill="white" fill-opacity="0.6"/>
</svg>